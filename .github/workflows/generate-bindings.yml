name: Check & Update PolyHook Bindings

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      cleanup_only:
        description: "Run cleanup of old workflow runs only"
        required: false
        type: boolean
        default: false
      days_ago:
        description: "Delete workflow runs older than (days)"
        required: false
        type: number
        default: 30

permissions:
  contents: write
  pull-requests: write

jobs:
  update-bindings:
    if: ${{ !inputs.cleanup_only }}
    runs-on: ubuntu-latest
    env:
      GO_PLUGIFY_REPO: untrustedmodders/go-plugify
      PLUGIN_REPO: untrustedmodders/plugify-plugin-polyhook
      PLUGIN_NAME: plugify-plugin-polyhook
      PLUGIN_SHORT_NAME: polyhook
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get latest remote versions
        id: remote_versions
        run: |
          S2SDK_TAG=$(gh release list --repo ${{ env.PLUGIN_REPO }} --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')
          GOPLUGIFY_TAG=$(gh release list --repo ${{ env.GO_PLUGIFY_REPO }} --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')
          
          gh release view "$S2SDK_TAG" --repo ${{ env.PLUGIN_REPO }} --json body --jq '.body' > /tmp/s2sdk_notes.txt
          gh release view "$GOPLUGIFY_TAG" --repo ${{ env.GO_PLUGIFY_REPO }} --json body --jq '.body' > /tmp/goplugify_notes.txt
          
          echo "s2sdk=$S2SDK_TAG" >> $GITHUB_OUTPUT
          echo "goplugify=$GOPLUGIFY_TAG" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check current versions and determine project version
        id: version_check
        run: |
          if [ ! -f .github/versions.json ]; then
            echo '{"project": "v0.0.0", "s2sdk": "v0.0.0", "go-plugify": "v0.0.0"}' > .github/versions.json
          fi

          CUR_PROJ=$(jq -r '.project' .github/versions.json)
          CUR_S2SDK=$(jq -r '.s2sdk' .github/versions.json)
          CUR_GOPLUGIFY=$(jq -r '."go-plugify"' .github/versions.json)

          REM_S2SDK="${{ steps.remote_versions.outputs.s2sdk }}"
          REM_GOPLUGIFY="${{ steps.remote_versions.outputs.goplugify }}"

          echo "Current: Project=$CUR_PROJ, S2SDK=$CUR_S2SDK, go-plugify=$CUR_GOPLUGIFY"
          echo "Remote: S2SDK=$REM_S2SDK, go-plugify=$REM_GOPLUGIFY"

          S2SDK_CHANGED="false"
          if [ "$CUR_S2SDK" != "$REM_S2SDK" ]; then
            S2SDK_CHANGED="true"
          fi

          GOPLUGIFY_CHANGED="false"
          if [ "$CUR_GOPLUGIFY" != "$REM_GOPLUGIFY" ]; then
            GOPLUGIFY_CHANGED="true"
          fi

          echo "s2sdk_changed=$S2SDK_CHANGED" >> $GITHUB_OUTPUT
          echo "goplugify_changed=$GOPLUGIFY_CHANGED" >> $GITHUB_OUTPUT

          if [ "$S2SDK_CHANGED" == "true" ] || [ "$GOPLUGIFY_CHANGED" == "true" ]; then
            echo "New version(s) detected!"
            echo "update_needed=true" >> $GITHUB_OUTPUT
          
            # Увеличиваем последнюю цифру (patch) проекта
            NEW_PROJ=$(echo $CUR_PROJ | awk -F. -v OFS=. '{$NF++;print}')
            echo "new_project_version=$NEW_PROJ" >> $GITHUB_OUTPUT
          else
            echo "Versions match. Nothing to do."
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Download Manifest
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          curl -L -o ${{ env.PLUGIN_NAME }}.pplugin.in https://github.com/${{ env.PLUGIN_REPO }}/raw/main/${{ env.PLUGIN_NAME }}.pplugin.in
          # The manifest is a JSON file, let's use jq to be safe
          jq --arg name "${{ env.PLUGIN_SHORT_NAME }}" '.name = $name' ${{ env.PLUGIN_NAME }}.pplugin.in > tmp.json && mv tmp.json ${{ env.PLUGIN_NAME }}.pplugin.in

      - name: Build Plugify Generator
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          git clone https://github.com/untrustedmodders/plugify-gen.git plugify-gen-repo
          cd plugify-gen-repo
          go build -o ../plugify-gen ./cmd/plugify-gen
          cd ..

          if [ -f ./plugify-gen ]; then
            ls -la ./plugify-gen
            file ./plugify-gen || true
          else
            echo "plugify-gen binary not found"
          fi
          
          rm -rf plugify-gen-repo

      - name: Generate Bindings
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          ./plugify-gen -manifest ${{ env.PLUGIN_NAME }}.pplugin.in -output ./ -lang golang -classes -scopes=false 
          find . -maxdepth 1 -type f \( -name "*.go" -o -name "*.c" -o -name "*.h" \) -delete
          mv ./${{ env.PLUGIN_SHORT_NAME }}/* ./
          rm -rf plugify-gen ${{ env.PLUGIN_NAME }}.pplugin.in ${{ env.PLUGIN_SHORT_NAME }}

      - name: Ensure Go Modules
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          ls -la
          
          if [ ! -f go.mod ]; then
            echo "go.mod not found, initializing..."
            go mod init github.com/${{ github.repository }}/v2
          fi
          
          go get -u ./...
          go mod tidy

      - name: Update versions file
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          jq --arg p "${{ steps.version_check.outputs.new_project_version }}" \
             --arg s "${{ steps.remote_versions.outputs.s2sdk }}" \
             --arg g "${{ steps.remote_versions.outputs.goplugify }}" \
             '.project = $p | .s2sdk = $s | ."go-plugify" = $g' \
             .github/versions.json > tmp.json && mv tmp.json .github/versions.json


      - name: Commit and Push changes
        if: steps.version_check.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          if [ "${{ steps.version_check.outputs.update_needed }}" == "true" ]; then
            git commit -m "feat: release ${{ steps.version_check.outputs.new_project_version }} (s2sdk: ${{ steps.remote_versions.outputs.s2sdk }}, go-plugify: ${{ steps.remote_versions.outputs.goplugify }})"
          else
            git commit -m "chore: update go.mod and go.sum"
          fi
          
          git push

      - name: Create Release
        if: steps.version_check.outputs.update_needed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version_check.outputs.new_project_version }}
          S2SDK_CHANGED: ${{ steps.version_check.outputs.s2sdk_changed }}
          GOPLUGIFY_CHANGED: ${{ steps.version_check.outputs.goplugify_changed }}
          REM_S2SDK: ${{ steps.remote_versions.outputs.s2sdk }}
          REM_GOPLUGIFY: ${{ steps.remote_versions.outputs.goplugify }}
        run: |
          echo "### Upstream Updates:" > release_notes.md
          
          if [ "$S2SDK_CHANGED" == "true" ]; then
            echo "" >> release_notes.md
            echo "#### \`plugify-plugin-s2sdk\` updated to **$REM_S2SDK**" >> release_notes.md
            echo "" >> release_notes.md
            cat /tmp/s2sdk_notes.txt >> release_notes.md
            echo "" >> release_notes.md
            echo "---" >> release_notes.md
          fi
          
          if [ "$GOPLUGIFY_CHANGED" == "true" ]; then
            echo "" >> release_notes.md
            echo "#### \`go-plugify\` updated to **$REM_GOPLUGIFY**" >> release_notes.md
            echo "" >> release_notes.md
            cat /tmp/goplugify_notes.txt >> release_notes.md
            echo "" >> release_notes.md
          fi
          
          gh release create "$VERSION" --notes-file release_notes.md

  delete-old-actions:
    if: ${{ inputs.cleanup_only || success() }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        uses: yanovation/delete-old-actions@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          days-ago: ${{ inputs.days_ago || 30 }}
          dry-run: false
